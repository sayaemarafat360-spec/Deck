workflows:
  android-debug:
    name: Deck — Debug APK
    max_build_duration: 30
    instance_type: mac_mini_m2

    environment:
      java: 17

    cache:
      cache_paths:
        - $HOME/.gradle/caches
        - $HOME/.gradle/wrapper

    scripts:
      - name: Setup Gradle wrapper
        script: |
          mkdir -p gradle/wrapper
          # Download gradle-wrapper.jar from services.gradle.org
          GRADLE_VERSION=8.4
          DIST_URL="https://services.gradle.org/distributions/gradle-${GRADLE_VERSION}-bin.zip"
          curl -fL "$DIST_URL" -o /tmp/gradle.zip
          unzip -p /tmp/gradle.zip "gradle-${GRADLE_VERSION}/lib/gradle-wrapper.jar" \
            > gradle/wrapper/gradle-wrapper.jar 2>/dev/null || \
          unzip -j /tmp/gradle.zip "*gradle-wrapper*.jar" -d /tmp/gwjar && \
            cp /tmp/gwjar/*.jar gradle/wrapper/gradle-wrapper.jar
          chmod +x gradlew

      - name: Build debug APK
        script: ./gradlew :app:assembleDebug --no-daemon --stacktrace

    artifacts:
      - app/build/outputs/apk/debug/*.apk

  android-release:
    name: Deck — Release APK
    max_build_duration: 60
    instance_type: mac_mini_m2

    environment:
      java: 17

    cache:
      cache_paths:
        - $HOME/.gradle/caches
        - $HOME/.gradle/wrapper

    scripts:
      - name: Setup Gradle wrapper
        script: |
          mkdir -p gradle/wrapper
          GRADLE_VERSION=8.4
          DIST_URL="https://services.gradle.org/distributions/gradle-${GRADLE_VERSION}-bin.zip"
          curl -fL "$DIST_URL" -o /tmp/gradle.zip
          unzip -p /tmp/gradle.zip "gradle-${GRADLE_VERSION}/lib/gradle-wrapper.jar" \
            > gradle/wrapper/gradle-wrapper.jar 2>/dev/null || \
          unzip -j /tmp/gradle.zip "*gradle-wrapper*.jar" -d /tmp/gwjar && \
            cp /tmp/gwjar/*.jar gradle/wrapper/gradle-wrapper.jar
          chmod +x gradlew

      - name: Build release APK
        script: ./gradlew :app:assembleRelease --no-daemon

      - name: Build App Bundle
        script: ./gradlew :app:bundleRelease --no-daemon

    artifacts:
      - app/build/outputs/apk/release/*.apk
      - app/build/outputs/bundle/release/*.aab

    publishing:
      email:
        recipients:
          - your-email@gmail.com
        notify:
          success: true
          failure: true
