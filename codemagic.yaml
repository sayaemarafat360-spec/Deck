workflows:
  android-release:
    name: NEBULA Native — Release APK
    max_build_duration: 60
    instance_type: mac_mini_m2

    environment:
      java: 17

    cache:
      cache_paths:
        - $HOME/.gradle/caches
        - $HOME/.gradle/wrapper

    scripts:
      - name: Download Gradle wrapper jar
        script: |
          mkdir -p gradle/wrapper
          curl -fL "https://github.com/gradle/gradle/raw/v8.4.0/gradle/wrapper/gradle-wrapper.jar" \
            -o gradle/wrapper/gradle-wrapper.jar
          chmod +x gradlew

      - name: Build release APK
        script: ./gradlew assembleRelease --no-daemon

      - name: Build App Bundle
        script: ./gradlew bundleRelease --no-daemon

    artifacts:
      - app/build/outputs/apk/release/*.apk
      - app/build/outputs/bundle/release/*.aab

    publishing:
      email:
        recipients:
          - your-email@gmail.com
        notify:
          success: true
          failure: true

  android-debug:
    name: NEBULA Native — Debug APK
    max_build_duration: 30
    instance_type: mac_mini_m2

    environment:
      java: 17

    scripts:
      - name: Download Gradle wrapper jar
        script: |
          mkdir -p gradle/wrapper
          curl -fL "https://github.com/gradle/gradle/raw/v8.4.0/gradle/wrapper/gradle-wrapper.jar" \
            -o gradle/wrapper/gradle-wrapper.jar
          chmod +x gradlew

      - name: Print SHA-1 fingerprint (add this to Firebase Console)
        script: ./gradlew signingReport --no-daemon 2>&1 | grep -A3 "Variant: debug" | head -20

      - name: Build debug APK
        script: ./gradlew assembleDebug --no-daemon

    artifacts:
      - app/build/outputs/apk/debug/*.apk
